<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Student Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4 text-center">Student Manager</h1>

<div class="card p-3 mb-4">

<input id="nameInput" class="form-control mb-2" placeholder="Student name">

<button id="addBtn" class="btn btn-primary">Add Student</button>

<button id="updateBtn" class="btn btn-warning mt-2" style="display:none">
Update Student
</button>

</div>

<table class="table table-striped">

<thead>

<tr>
<th>Name</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script src="js/app.js"></script>

</body>
</html>
