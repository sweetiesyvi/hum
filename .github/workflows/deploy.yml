name: deploy.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H 35.222.142.127 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ngulungudulcinee
          SSH_HOST: 35.222.142.127
          APP_DIR: hum
          PM2_NAME: hum
        run: |
          ssh -i ~/.ssh/id_rsa -T "$SSH_USER@$SSH_HOST" <<EOF
            set -e

            cd "$APP_DIR"

            git pull --rebase
            sudo npm ci

            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.js --name "$PM2_NAME"

            pm2 save
          EOF
